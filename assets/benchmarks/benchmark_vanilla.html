<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Standard Vanilla Benchmark (Krause-style)</title>
    <style>
        .row { display: flex; padding: 5px; border-bottom: 1px solid #ccc; }
        .col-id { width: 50px; }
        .col-label { flex-grow: 1; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Vanilla JS - 1,000 Rows Benchmark</h1>
        <button id="run">Run Benchmark</button>
        <div id="tbody"></div>
    </div>

    <script>
        // 1. Preparar la plantilla
        const template = document.createElement('template');
        template.innerHTML = `
            <div class="row">
                <div class="col-id"></div>
                <div class="col-label"></div>
            </div>`;

        function buildData(count) {
            const adjectives = ["Pretty", "Large", "Big", "Small", "Tall"];
            const colors = ["Red", "Yellow", "Blue", "Green", "Pink"];
            const nouns = ["Table", "Chair", "House", "Car", "Tree"];
            const data = [];
            for (let i = 0; i < count; i++) {
                data.push({
                    id: i + 1,
                    label: `${adjectives[i % 5]} ${colors[i % 5]} ${nouns[i % 5]}`
                });
            }
            return data;
        }

        document.getElementById('run').addEventListener('click', () => {
            const data = buildData(1000);
            const container = document.getElementById('tbody');
            container.innerHTML = ''; // Limpiar previo

            const start = performance.now();

            // 2. Ejecución pura de Vanilla JS
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < data.length; i++) {
                const clone = template.content.cloneNode(true);
                const item = data[i];
                
                // Asignación directa con textContent (Ultra rápido y seguro)
                clone.querySelector('.col-id').textContent = item.id;
                clone.querySelector('.col-label').textContent = item.label;
                
                fragment.appendChild(clone);
            }
            
            container.appendChild(fragment);

            // 3. Medición del Render + Paint
            requestAnimationFrame(() => {
                setTimeout(() => {
                    const end = performance.now();
                    const total = (end - start).toFixed(2);
                    
                    const marker = document.createElement('div');
                    marker.style = "padding:10px; background:gold; font-weight:bold; margin-top:10px;";
                    marker.innerText = `Vanilla Create 1,000 rows: ${total}ms`;
                    document.getElementById('app').prepend(marker);
                }, 0);
            });
        });
    </script>
</body>
</html>
